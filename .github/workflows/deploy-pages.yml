name: Deploy site to GitHub Pages

on:
  push:
    branches: ["claude/lean-ai-repo-transfer-6LCY1", "main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble public site
        run: |
          mkdir -p _site
          cp index.html invoice.html styles.css script.js _site/
          cp -r assets _site/assets
          touch _site/.nojekyll

      - name: Configure Pages (enables Pages if needed)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
